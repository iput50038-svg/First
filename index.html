<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>天気ページ改良版</title>
</head>
<body>

  <div class="container">

    <header class="header">
      <h1>天気サイト</h1>
    </header>

    <div class="search">
      <input type="text" placeholder="地名を入力">
      <button>検索</button>
    </div>

    <section class="weather">
      <div class="day">
        <h2>今日</h2>
        <p>☁️ 13℃ / 9℃</p>
      </div>

      <div class="day">
        <h2>明日</h2>
        <p>🌤 18℃ / 8℃</p>
      </div>

      <div class="day">
        <h2>明後日</h2>
        <p>☀️ 20℃ / 12℃</p>
      </div>

    </section>

  </div>

</body>
</html>

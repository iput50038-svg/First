<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  .badge {
    display: inline-block;
    width: 20px;
    height: 20px;
    background-color: red;
    border-radius: 50%;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%   { opacity: 1; }
    50%  { opacity: 0.3; }
    100% { opacity: 1; }
  }
</style>
</head>
<body>

<p>新着メッセージ <span class="badge"></span></p>

</body>
</html>
